name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            lib_name: libcasc.dylib
            lib_path_var: DYLD_LIBRARY_PATH
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            lib_name: libcasc.so
            lib_path_var: LD_LIBRARY_PATH

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build libcasc
        run: |
          git clone --depth=1 https://github.com/ladislav-zezula/CascLib /tmp/CascLib
          cmake -S /tmp/CascLib -B /tmp/CascLib/build \
            -DCASC_BUILD_SHARED_LIB=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build /tmp/CascLib/build --parallel
          mkdir -p lib
          cp /tmp/CascLib/build/${{ matrix.lib_name }} lib/

      - name: Build release binary
        env:
          ${{ matrix.lib_path_var }}: lib
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/casc-extractor \
             casc-extractor-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: casc-extractor-${{ matrix.target }}
          path: casc-extractor-${{ matrix.target }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: true
          body: |
            ## Installation

            Download the binary for your platform and make it executable.

            **Note:** This binary requires `libcasc` at runtime. Place `libcasc.dylib` (macOS)
            or `libcasc.so` (Linux) in the same directory as the binary, then set
            `DYLD_LIBRARY_PATH` / `LD_LIBRARY_PATH` to that directory before running.

            Build libcasc from source: https://github.com/ladislav-zezula/CascLib
          files: |
            casc-extractor-aarch64-apple-darwin
            casc-extractor-x86_64-unknown-linux-gnu
